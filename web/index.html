<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurobotika — CSF System Explorer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Neurobotika</h1>
            <p class="subtitle">Navigate the human cerebrospinal fluid system as a microrobot</p>
        </header>

        <div id="unity-container">
            <div id="unity-canvas-container">
                <!-- Unity WebGL player loads here -->
                <canvas id="unity-canvas" tabindex="-1"></canvas>
            </div>
            <div id="loading-overlay">
                <div class="loading-content">
                    <h2>Loading CSF Explorer...</h2>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <p id="progress-text">0%</p>
                </div>
            </div>
        </div>

        <div class="controls-info">
            <h3>Controls</h3>
            <ul>
                <li><strong>WASD</strong> — Move forward/backward/strafe</li>
                <li><strong>Mouse</strong> — Look around</li>
                <li><strong>Space</strong> — Move up</li>
                <li><strong>Shift</strong> — Move down</li>
                <li><strong>Scroll</strong> — Adjust speed</li>
            </ul>
        </div>

        <footer>
            <p>Neurobotika — Open-source CSF digital twin project</p>
        </footer>
    </div>

    <!-- Unity loader script (generated by Unity build) -->
    <script src="unity/Build/WebGLBuild.loader.js"></script>
    <script>
        var unityInstance = null;
        var loadingOverlay = document.getElementById("loading-overlay");
        var progressFill = document.getElementById("progress-fill");
        var progressText = document.getElementById("progress-text");

        createUnityInstance(document.querySelector("#unity-canvas"), {
            dataUrl: "unity/Build/WebGLBuild.data.br",
            frameworkUrl: "unity/Build/WebGLBuild.framework.js.br",
            codeUrl: "unity/Build/WebGLBuild.wasm.br",
            streamingAssetsUrl: "unity/StreamingAssets",
            companyName: "Neurobotika",
            productName: "CSF Explorer",
            productVersion: "0.1.0",
        }, function (progress) {
            var pct = Math.round(progress * 100);
            progressFill.style.width = pct + "%";
            progressText.textContent = pct + "%";
        }).then(function (instance) {
            unityInstance = instance;
            loadingOverlay.style.display = "none";
        }).catch(function (message) {
            console.error("Unity load failed:", message);
            progressText.textContent = "Failed to load. Check console for details.";
        });
    </script>
</body>
</html>
